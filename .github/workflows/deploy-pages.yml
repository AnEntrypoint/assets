name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute GLB cache key
        id: glb-hash
        run: echo "hash=$(git ls-files '*.glb' | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore thumbnail cache
        id: thumb-cache
        uses: actions/cache@v4
        with:
          path: docs/thumbs
          key: thumbs-${{ steps.glb-hash.outputs.hash }}
          restore-keys: thumbs-

      - name: Install Chrome dependencies
        if: steps.thumb-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgbm1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcairo2 libcups2 libdbus-1-3 libgdk-pixbuf2.0-0 \
            libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 \
            libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 fonts-liberation xdg-utils

      - name: Install screenshot-glb
        if: steps.thumb-cache.outputs.cache-hit != 'true'
        run: npm install -g @shopify/screenshot-glb

      - name: Generate thumbnails
        if: steps.thumb-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p docs/thumbs
          git ls-files "*.glb" | while IFS= read -r glb; do
            mkdir -p "docs/thumbs/$(dirname "$glb")"
            out="docs/thumbs/${glb%.glb}.png"
            [ -f "$out" ] && continue
            echo "Rendering $glb"
            screenshot-glb -i "$glb" -o "$out" --width 256 --height 256 || \
              echo "WARN: failed $glb"
          done

      - name: Generate asset manifest
        run: |
          node - <<'SCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const files = execSync('git ls-files "*.glb"').toString().trim().split('\n').filter(Boolean);
          const manifest = {};
          for (const f of files) {
            const cat = f.split('/')[0];
            const base = f.split('/').pop().replace(/\.glb$/, '');
            const name = base
              .replace(/_[a-f0-9]{8}_v\d+$/, '')
              .replace(/_v\d+$/, '')
              .replace(/[_-]/g, ' ')
              .replace(/\b\w/g, c => c.toUpperCase());
            const thumb = `thumbs/${f.replace(/\.glb$/, '.png')}`;
            if (!manifest[cat]) manifest[cat] = [];
            manifest[cat].push({ name, path: f, thumb });
          }
          fs.writeFileSync('docs/manifest.json', JSON.stringify(manifest));
          console.log('Total assets:', Object.values(manifest).flat().length);
          SCRIPT

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
