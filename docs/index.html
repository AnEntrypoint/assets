<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asset Viewer</title>
<link rel="stylesheet" href="lib/rippleui.css">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{display:flex;flex-direction:column;width:220px;flex-shrink:0;border-right:1px solid #2a2a2a;overflow:hidden}
#sidebar-scroll{overflow-y:auto;flex:1}
#main{display:flex;flex-direction:column;flex:1;overflow:hidden}
#grid-wrap{flex:1;overflow-y:auto;padding:12px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.asset-card{cursor:pointer;padding:0;overflow:hidden}
.asset-card .card-body{padding:0}
.thumb{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:32px;background:#181818}
.asset-card .label{padding:6px 10px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#aaa}
.asset-card.selected{outline:2px solid #4a9eff}
#viewer-col{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid #2a2a2a}
#viewer-col.hidden{display:none}
model-viewer{width:100%;height:320px;background:#111;--progress-bar-color:#4a9eff}
#viewer-meta{padding:12px;overflow-y:auto;flex:1}
.menu-item{padding:8px 14px;font-size:13px}
.menu-item.menu-active{background:#1e2a3a;color:#4a9eff}
.menu-title{padding:8px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555}
</style>
</head>
<body>
<nav class="navbar navbar-sticky navbar-glass" style="border-bottom:1px solid #222;z-index:10">
  <div class="navbar-start"><span class="navbar-brand" style="font-weight:600;font-size:15px">🎮 Asset Viewer</span></div>
  <div class="navbar-end" id="nav-count" style="font-size:12px;color:#666;padding:0 14px"></div>
</nav>
<div id="app">
  <div id="sidebar">
    <div style="padding:8px">
      <input id="q" class="input input-sm input-block input-ghost-primary" placeholder="Search…" autocomplete="off">
    </div>
    <div id="sidebar-scroll"><ul class="menu-items" id="cat-menu"></ul></div>
  </div>
  <div id="main">
    <div id="grid-wrap"><div id="grid"></div></div>
  </div>
  <div id="viewer-col" class="hidden">
    <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="1" exposure="1.2"></model-viewer>
    <div id="viewer-meta"></div>
  </div>
</div>
<script type="module">
import { createElement as h, applyDiff } from './lib/webjsx/index.js';

const BASE = 'https://raw.githubusercontent.com/AnEntrypoint/assets/master/';
const ICONS = {
  Airport:'✈️',Appliances:'🍳',BeerBottles:'🍺',Containers:'📦',
  Decor:'🏺',Electronics:'💻',Furniture:'🪑',Industrial:'⚙️',
  Inside:'🏠',Misc:'🔧',Nature:'🌿',Outdoor:'🏙️',
  Outside:'🌳',Sports:'⚽',Vehicles:'🚗',Weapons:'⚔️'
};

let manifest={}, currentCat=null, searchTerm='', selectedGroup=null;

const $ = id => document.getElementById(id);

function friendlyName(path){
  const base = path.split('/').pop().replace(/\.glb$/,'');
  return base.replace(/_[a-f0-9]{8}_v\d+$/,'').replace(/_v\d+$/,'')
    .replace(/[_-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

function groupByAsset(items){
  const map={};
  for(const item of items){
    const key=item.path.replace(/_[a-f0-9]{8}_v\d+\.glb$/,'').replace(/_v\d+\.glb$/,'');
    if(!map[key])map[key]=[];
    map[key].push(item);
  }
  return Object.values(map);
}

function variantNum(path){ const m=path.match(/_v(\d+)\.glb$/); return m?+m[1]:1; }

function renderSidebar(){
  const totalAll = Object.values(manifest).flat().length;
  const items = [
    h('li',{class:'menu-item'+(currentCat===null?' menu-active':''),onclick:()=>{currentCat=null;render();}},
      h('span',{},'🗂️ All'),
      h('span',{class:'badge badge-sm badge-flat',style:'margin-left:auto'},totalAll)
    ),
    ...Object.entries(manifest).map(([cat,assets])=>
      h('li',{class:'menu-item'+(currentCat===cat?' menu-active':''),onclick:()=>{currentCat=cat;render();}},
        h('span',{},ICONS[cat]||'📁',' '+cat),
        h('span',{class:'badge badge-sm badge-flat',style:'margin-left:auto'},assets.length)
      )
    )
  ];
  applyDiff($('cat-menu'), items);
}

function renderGrid(){
  const pool = currentCat ? manifest[currentCat] : Object.values(manifest).flat();
  const q = searchTerm.toLowerCase();
  const filtered = q ? pool.filter(i=>i.name.toLowerCase().includes(q)) : pool;
  const groups = groupByAsset(filtered);
  $('nav-count').textContent = filtered.length+' assets';

  if(!groups.length){
    applyDiff($('grid'),[h('div',{style:'grid-column:1/-1;text-align:center;color:#444;padding:60px 0;font-size:14px'},'No assets found')]);
    return;
  }

  const cards = groups.map(group=>{
    const rep = group.reduce((a,b)=>variantNum(a.path)<variantNum(b.path)?a:b);
    const icon = ICONS[rep.path.split('/')[0]]||'📦';
    const selected = selectedGroup && selectedGroup[0].path.replace(/_[a-f0-9]{8}_v\d+\.glb$/,'').replace(/_v\d+\.glb$/,'') === group[0].path.replace(/_[a-f0-9]{8}_v\d+\.glb$/,'').replace(/_v\d+\.glb$/,'');
    return h('div',{class:'card asset-card'+(selected?' selected':''),onclick:()=>openViewer(group,rep)},
      h('div',{class:'card-body'},
        h('div',{class:'thumb'},icon),
        h('div',{class:'label',title:rep.name},rep.name)
      )
    );
  });
  applyDiff($('grid'), cards);
}

function openViewer(group, rep){
  selectedGroup = group;
  renderGrid();
  $('viewer-col').classList.remove('hidden');
  loadVariant(rep.path);
  renderMeta(group, rep.path);
}

function loadVariant(path){
  $('mv').src = BASE+path;
}

function renderMeta(group, activePath){
  const name = group[0].name;
  const sorted = [...group].sort((a,b)=>variantNum(a.path)-variantNum(b.path));
  const varBtns = sorted.length>1 ? sorted.map(item=>
    h('button',{
      class:'btn btn-xs'+(item.path===activePath?' btn-primary':' btn-outline'),
      onclick:()=>{ loadVariant(item.path); renderMeta(group,item.path); }
    },'v'+variantNum(item.path))
  ) : [];

  const dlPath = activePath;
  applyDiff($('viewer-meta'),[
    h('div',{},
      h('p',{style:'font-weight:600;font-size:14px;margin-bottom:8px'},name),
      varBtns.length ? h('div',{style:'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px'},...varBtns) : h('span',{}),
      h('a',{
        class:'btn btn-sm btn-outline-primary btn-block',
        href:BASE+dlPath,
        download:dlPath.split('/').pop(),
        target:'_blank'
      },'⬇ Download .glb')
    )
  ]);
}

$('q').addEventListener('input', e=>{ searchTerm=e.target.value; renderGrid(); });

function render(){ renderSidebar(); renderGrid(); }

fetch('manifest.json').then(r=>r.json()).then(data=>{
  manifest=data;
  render();
});
</script>
</body>
</html>
